<div class="application-landing">
  <div class="landing-header">
    <h1>Application Management</h1>
    <p>Manage your applications with ease</p>
  </div>

  <div class="cards-container">
    <div class="card" (click)="navigateToCreateApplication()">
      <div class="card-icon">📝</div>
      <h2>Create Application</h2>
      <p>Add a new application to the system</p>
      <button class="btn btn-primary">Create New</button>
    </div>

    <div class="card" (click)="navigateToViewApplications()">
      <div class="card-icon">📋</div>
      <h2>View Applications</h2>
      <p>View and manage all applications</p>
      <button class="btn btn-primary">View All</button>
    </div>
  </div>
</div>
