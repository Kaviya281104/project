<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Create New Employee</h2>
 
    <form [formGroup]="form" (ngSubmit)="save()" class="login-form" novalidate>
      <div class="form-group">
        <label for="employeeId">Employee ID</label>
        <input
          id="employeeId"
          type="text"
          formControlName="employeeId"
          placeholder="Enter employee ID"
        />
        <div class="field-error" *ngIf="employeeId?.touched && employeeId?.invalid">
          Employee ID is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="name">Name</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Enter employee name"
        />
        <div class="field-error" *ngIf="name?.touched && name?.invalid">
          Name is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="location">Location</label>
        <input
          id="location"
          type="text"
          formControlName="location"
          placeholder="Enter work location"
        />
        <div class="field-error" *ngIf="location?.touched && location?.invalid">
          Location is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="lead">Lead</label>
        <input
          id="lead"
          type="text"
          formControlName="lead"
          placeholder="Enter lead/manager name"
        />
        <div class="field-error" *ngIf="lead?.touched && lead?.invalid">
          Lead is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter password"
        />
        <div class="field-error" *ngIf="password?.touched && password?.invalid">
          <span *ngIf="password?.errors?.['required']">Password is required.</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>
 
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirm password"
        />
        <div class="field-error" *ngIf="confirmPassword?.touched && confirmPassword?.invalid">
          <span *ngIf="confirmPassword?.errors?.['required']">Confirm password is required.</span>
          <span *ngIf="confirmPassword?.errors?.['mismatch']">Passwords do not match.</span>
        </div>
      </div>
 
      <button type="submit" class="login-button" [disabled]="form.invalid">
        Create Employee
      </button>
    </form>
 
    <div class="button-row">
      <button type="button" class="secondary-button" (click)="cancel()">
        Cancel
      </button>
    </div>
  </div>
</div>
