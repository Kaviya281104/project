
<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Reports</h2>
 
    <div class="button-row">
      <button type="button" class="secondary-button" [class.active]="activeFilter === 'daily'" (click)="selectFilter('daily')">
        Daily
      </button>
      <button type="button" class="secondary-button" [class.active]="activeFilter === 'weekly'" (click)="selectFilter('weekly')">
        Weekly
      </button>
      <button type="button" class="secondary-button" [class.active]="activeFilter === 'monthly'" (click)="selectFilter('monthly')">
        Monthly
      </button>
      <button type="button" class="secondary-button" [class.active]="activeFilter === 'yearly'" (click)="selectFilter('yearly')">
        Yearly
      </button>
      <button type="button" class="secondary-button" [class.active]="activeFilter === 'custom'" (click)="selectFilter('custom')">
        Custom
      </button>
      <button type="button" class="ai-button" (click)="showInsights()">
        AI
      </button>
    </div>
 
    <div class="custom-panel" *ngIf="isCustomSelected">
      <div class="custom-inputs">
        <div class="form-group">
          <label for="customStartDate">Start Date</label>
          <input id="customStartDate" type="date" [(ngModel)]="customStartDate" name="customStartDate" />
        </div>
        <div class="form-group">
          <label for="customEndDate">End Date</label>
          <input id="customEndDate" type="date" [(ngModel)]="customEndDate" name="customEndDate" />
        </div>
      </div>
      <div class="custom-actions">
        <button type="button" class="primary-button" (click)="applyCustom()">Apply</button>
      </div>
      <div class="error-message" *ngIf="customDateError">{{ customDateError }}</div>
    </div>
 
    <div class="summary-row">
      <span>Showing {{ currentPeriodLabel }} report</span>
      <span *ngIf="reportRangeText">{{ reportRangeText }}</span>
    </div>
 
    <div class="table-container">
      <table class="report-table">
        <thead>
          <tr>
            <th>Task</th>
            <th>Hours</th>
            <th>Comments</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of reports">
            <td>{{ r.taskId }}</td>
            <td>{{ r.hours }}</td>
            <td>{{ r.comments }}</td>
          </tr>
          <tr *ngIf="reports.length === 0">
            <td colspan="3" class="empty-state">No report data available.</td>
          </tr>
        </tbody>
      </table>
    </div>
 
    <div class="insight-row">
      <span class="ai-hint">{{ insight }}</span>
    </div>
  </div>
</div>
