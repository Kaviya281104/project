
<div class="task-landing-page">
  <div class="task-landing-card">
    <div class="task-landing-header">
      <h1>Task Management</h1>
      <p>Quickly access task creation and task lists from one central page.</p>
    </div>

    <div class="task-landing-actions">
      <button class="btn btn-primary" (click)="onCreateTask()">Create Task</button>
      <button class="btn btn-secondary" (click)="onViewTasks()">View Tasks</button>
    </div>
  </div>
</div>
