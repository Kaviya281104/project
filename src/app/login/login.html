
 



 
<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Login</h2>
 
    <form [formGroup]="form" (ngSubmit)="login()" class="login-form" novalidate>
      <div class="form-group">
        <label for="employeeId">Employee ID</label>
        <input
          id="employeeId"
          type="text"
          formControlName="employeeId"
          placeholder="Enter your employee ID"
          autocomplete="username"
        />
        <div class="field-error" *ngIf="employeeId?.touched && employeeId?.invalid">
          Employee ID is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <div class="field-error" *ngIf="password?.touched && password?.invalid">
          Password is required.
        </div>
      </div>
 
      <button type="submit" class="login-button" [disabled]="form.invalid">
        Login
      </button>
    </form>
 
    <div class="button-row">
      <button type="button" class="secondary-button" (click)="newUser()">
        New User
      </button>
      <button type="button" class="secondary-button" (click)="resetPassword()">
        Reset Password
      </button>
    </div>
  </div>
</div>
