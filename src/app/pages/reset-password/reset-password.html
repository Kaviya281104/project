<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Reset Password</h2>
 
    <form [formGroup]="form" (ngSubmit)="save()" class="login-form" novalidate>
      <div class="form-group">
        <label for="employeeId">Employee ID</label>
        <input
          id="employeeId"
          type="text"
          formControlName="employeeId"
          placeholder="Enter your employee ID"
        />
        <div class="field-error" *ngIf="employeeId?.touched && employeeId?.invalid">
          Employee ID is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="name">Name</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Enter your name"
        />
        <div class="field-error" *ngIf="name?.touched && name?.invalid">
          Name is required.
        </div>
      </div>
 
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          placeholder="Enter new password"
        />
        <div class="field-error" *ngIf="newPassword?.touched && newPassword?.invalid">
          <span *ngIf="newPassword?.errors?.['required']">New password is required.</span>
          <span *ngIf="newPassword?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>
 
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirm new password"
        />
        <div class="field-error" *ngIf="confirmPassword?.touched && confirmPassword?.invalid">
          <span *ngIf="confirmPassword?.errors?.['required']">Confirm password is required.</span>
          <span *ngIf="confirmPassword?.errors?.['mismatch']">Passwords do not match.</span>
        </div>
      </div>
 
      <button type="submit" class="login-button" [disabled]="form.invalid">
        Save
      </button>
    </form>
 
    <div class="button-row">
      <button type="button" class="secondary-button" (click)="cancel()">
        Cancel
      </button>
    </div>
  </div>
</div>
